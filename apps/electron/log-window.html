<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Doujinshi Manager — Logs</title>
  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --border-hover: #444444;
      --accent: #ff2e55;
      --text: #ffffff;
      --muted: #888888;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    #log-area::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      padding: 20px;
    }

    .window {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .muted {
      font-size: 11px;
      color: var(--muted);
    }

    #log-area {
      width: 100%;
      min-height: 460px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      resize: none;
      outline: none;
      overflow: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    button {
      height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: #202020;
      border-color: var(--border-hover);
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="header">
      <div>
        <h1>Backend Logs</h1>
        <div class="muted">Live output from the local app process</div>
      </div>
      <button id="clear" type="button">Clear</button>
    </div>

    <textarea id="log-area" readonly></textarea>
  </div>

  <script src="log-window.js"></script>
</body>
</html>
