<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Doujinshi Manager</title>
  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --border-hover: #444444;
      --accent: #ff2e55;
      --text: #ffffff;
      --muted: #888888;
      --success: #2ecc71;
      --danger-soft: rgba(255, 46, 85, 0.16);
      --danger-border: rgba(255, 46, 85, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .popup {
      width: 304px;
      height: 384px;
      margin: 8px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .header,
    .footer {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .footer {
      border-bottom: 0;
      border-top: 1px solid var(--border);
      flex-direction: column;
      align-items: stretch;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 78px;
      justify-content: flex-end;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 46, 85, 0.16);
      flex: 0 0 auto;
    }

    .status.running .dot {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.16);
    }

    .content {
      padding: 12px 14px;
      display: grid;
      grid-template-rows: 112px 38px 38px 1fr;
      flex: 1 1 auto;
      min-height: 0;
      gap: 10px;
      overflow: hidden;
      align-content: start;
    }

    .download-card {
      min-height: 112px;
      height: 112px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
    }

    .download-card[data-state="idle"] {
      border-color: rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    .download-card[data-state="done"] {
      border-color: rgba(46, 204, 113, 0.32);
    }

    .download-card[data-state="preparing"] {
      border-color: rgba(255, 184, 77, 0.4);
      background: rgba(255, 184, 77, 0.06);
    }

    .download-card[data-state="finalizing"] {
      border-color: rgba(96, 165, 250, 0.42);
      background: rgba(96, 165, 250, 0.08);
    }

    .download-card[data-state="failed"] {
      border-color: rgba(255, 46, 85, 0.38);
    }

    .download-title {
      min-height: 16px;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .download-card[data-state="idle"] .download-title {
      font-size: 12px;
      color: var(--muted);
    }

    .progress-track {
      height: 8px;
      background: #141414;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #202020;
      opacity: 1;
    }

    .download-card[data-state="idle"] .progress-track {
      opacity: 0.42;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.16s ease;
    }

    .download-card[data-state="preparing"] .progress-fill {
      background: linear-gradient(90deg, #ffb84d, var(--accent));
      animation: loadingPulse 1s ease-in-out infinite alternate;
    }

    .download-card[data-state="finalizing"] .progress-fill {
      background: linear-gradient(90deg, #60a5fa, #8b5cf6);
      animation: loadingPulse 1s ease-in-out infinite alternate;
    }

    @keyframes loadingPulse {
      from { opacity: 0.55; }
      to { opacity: 1; }
    }

    .progress-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .timer-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .progress-meta span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .download-card[data-state="idle"] .progress-meta {
      color: #7d7d7d;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .button-row.two {
      grid-template-columns: 1fr 1fr;
    }

    .button-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .button {
      height: 38px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, color 0.15s ease;
    }

    .button:hover {
      border-color: var(--border-hover);
      background: #202020;
      transform: translateY(-1px);
    }

    .button.start {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.start:hover {
      background: #ff3a62;
      border-color: #ff3a62;
    }

    .button.stop {
      background: var(--danger-soft);
      border-color: var(--danger-border);
      color: #ff9aad;
    }

    .button.stop:hover {
      background: rgba(255, 46, 85, 0.22);
      border-color: #ff4b6f;
      color: #ffc2ce;
    }

    .button.quit {
      width: 100%;
      color: var(--text);
    }

    .button.quit:hover {
      color: #ff9aad;
    }

    .version {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="title">Doujinshi Manager</div>
      <div class="status" id="status-pill">
        <span class="dot"></span>
        <span id="status-text">Stopped</span>
      </div>
    </div>

    <div class="content">
      <div class="download-card" id="download-card" data-state="idle" aria-live="polite">
        <div class="download-title" id="download-title">No active download</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="page-count">Waiting for the next job</span>
          <span id="queue-count">0 queued</span>
          <span id="progress-percent">Idle</span>
        </div>
        <div class="timer-row">
          <span id="batch-timer">Batch --:--</span>
          <span id="gallery-timer">Gallery --:--</span>
        </div>
      </div>

      <div class="button-row">
        <button id="toggle-backend" class="button start" type="button">Start</button>
      </div>

      <div class="button-row three">
        <button id="open-logs" class="button" type="button">Open Logs</button>
        <button id="open-settings" class="button" type="button">Settings</button>
        <button id="open-browse" class="button" type="button">Browse</button>
      </div>
    </div>

    <div class="footer">
      <button id="quit-app" class="button quit" type="button">Quit</button>
      <div class="version" id="app-version">v1.0.0</div>
    </div>
  </div>

  <script src="tray-popup.js"></script>
</body>
</html>
